name: CI do Autocar
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Instalar ferramentas
      run: pip install pytest ruff
    - name: Rodar Analisador de Qualidade (Lint)
      run: ruff check .
    - name: Rodar Testes Automatizados
      run: pytest